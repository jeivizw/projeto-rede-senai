<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil | Conecta SENAI</title>
    
    <link rel="stylesheet" href="style3.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="app-header">
        <div class="header-content config-header">
            <a href="home.html" class="back-link">
                <i class="fa-solid fa-arrow-left"></i>
                <span>Voltar ao Feed</span>
            </a>
            
            <div class="logo-container" onclick="switchTab('feed')">
                    <img src="img/redwhite.png" alt="Conecta SENAI" class="logo-img logo-light">
                    <img src="img/redblack.png" alt="Conecta SENAI" class="logo-img logo-dark">
                </div>
            
            <div style="width: 110px;"></div>
        </div>
    </header>

    <main class="container profile-main">
        <div class="profile-card">
            <div class="profile-banner"></div>
            
            <div class="profile-content">
                <img src="https://thumbs.dreamstime.com/b/homem-cinzento-do-placeholder-da-foto-pessoa-gen%C3%A9rica-silhueta-cinzenta-em-um-fundo-branco-144511705.jpg" alt="Foto de Perfil" class="profile-avatar">
                <h2 class="profile-name">João Souza</h2>
                <p class="profile-desc">Técnico em Desenvolvimento de Sistemas • SENAI Sorocaba</p>
                
                <div class="profile-stats">
                    <div class="stat-item">
                        <span class="stat-number">12</span>
                        <span class="stat-label">Projetos</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number">142</span>
                        <span class="stat-label">Seguidores</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number">8</span>
                        <span class="stat-label">Feedbacks</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="profile-tabs-section">
            <div class="profile-tabs">
                <button class="tab-btn active">Minha Vitrine</button>
                <button class="tab-btn">Atividade</button>
            </div>

            <div class="projects-grid">
                <div class="project-card">
                    <div class="project-img-placeholder">
                        <i class="fa-solid fa-code"></i>
                    </div>
                    <h3 class="project-title">Dashboard de Almoxarifado</h3>
                    <p class="project-stack">Stack: HTML, Tailwind, PHP</p>
                </div>
                <div class="project-card">
                    <div class="project-img-placeholder">
                        <i class="fa-solid fa-microchip"></i>
                    </div>
                    <h3 class="project-title">Automação com ESP32</h3>
                    <p class="project-stack">IoT e Sensores de Presença</p>
                </div>
            </div>
        </div>
    </main>

    <script src="global.js"></script>
    <script src="home.js"></script>
</body>
</html>
