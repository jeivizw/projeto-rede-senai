<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil | Conecta SENAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <header class="bg-white border-b border-slate-100 py-4 px-6 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-slate-500 hover:text-senai-red transition">
                <i class="fa-solid fa-arrow-left"></i>
                <span class="text-sm font-medium">Voltar ao Feed</span>
            </a>
            <span class="font-bold text-lg">Meu Perfil</span>
            <div class="w-8"></div> </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 mt-10">
        <div class="bg-white rounded-3xl p-8 shadow-sm border border-slate-100 text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-24 bg-gradient-to-r from-slate-900 to-senai-red opacity-10"></div>
            
            <div class="relative pt-6">
                <img src="https://i.pravatar.cc/150?img=11" class="w-24 h-24 rounded-full mx-auto ring-4 ring-white shadow-lg">
                <h2 class="mt-4 text-2xl font-bold">João Silva</h2>
                <p class="text-slate-500 text-sm">Técnico em Desenvolvimento de Sistemas • SENAI Joinville</p>
                
                <div class="flex justify-center gap-8 mt-6">
                    <div class="text-center">
                        <span class="block font-bold text-lg text-slate-800">12</span>
                        <span class="text-xs text-slate-400 uppercase tracking-wider">Projetos</span>
                    </div>
                    <div class="text-center">
                        <span class="block font-bold text-lg text-slate-800">142</span>
                        <span class="text-xs text-slate-400 uppercase tracking-wider">Seguidores</span>
                    </div>
                    <div class="text-center">
                        <span class="block font-bold text-lg text-slate-800">8</span>
                        <span class="text-xs text-slate-400 uppercase tracking-wider">Feedbacks</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-8">
            <div class="flex border-b border-slate-200 gap-8 mb-6">
                <button class="pb-4 border-b-2 border-senai-red text-senai-red font-semibold text-sm">Minha Vitrine</button>
                <button class="pb-4 text-slate-400 font-medium text-sm hover:text-slate-600 transition">Atividade</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm hover:shadow-md transition cursor-pointer">
                    <div class="w-full h-40 bg-slate-100 rounded-xl mb-4 flex items-center justify-center">
                        <i class="fa-solid fa-code text-3xl text-slate-300"></i>
                    </div>
                    <h3 class="font-bold text-slate-800">Dashboard de Almoxarifado</h3>
                    <p class="text-xs text-slate-500 mt-1 italic">Stack: HTML, Tailwind, PHP</p>
                </div>
                <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm hover:shadow-md transition cursor-pointer">
                    <div class="w-full h-40 bg-slate-100 rounded-xl mb-4 flex items-center justify-center">
                        <i class="fa-solid fa-microchip text-3xl text-slate-300"></i>
                    </div>
                    <h3 class="font-bold text-slate-800">Automação com ESP32</h3>
                    <p class="text-xs text-slate-500 mt-1 italic">IoT e Sensores de Presença</p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
