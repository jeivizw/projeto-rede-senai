<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Conecta SENAI</title>
    
    <link rel="stylesheet" href="style4.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="login-card">
        <h1>Conecta SENAI</h1>
        <p>Acede à tua conta para continuar</p>

        <form>
            <div class="form-group">
                <label>Utilizador</label>
                <input type="text" placeholder="E-mail ou CPF" required>
            </div>
            
            <div class="form-group">
                <label>Palavra-passe</label>
                <input type="password" placeholder="A tua senha" required>
            </div>
            
            <button type="button" onclick="window.location.href='home.html'">
                Entrar
            </button>
        </form>
    </div>

    <script src="global.js"></script>
</body>
</html>
