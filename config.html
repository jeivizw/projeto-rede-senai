<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações | Conecta SENAI</title>

    <link rel="stylesheet" href="style2.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <header class="app-header">
        <div class="header-content config-header">
            <a href="home.html" class="back-link">
                <i class="fa-solid fa-chevron-left"></i>
                <span>Voltar</span>
            </a>

            <img src="img/redwhite.png" alt="Logo Conecta SENAI" class="logo-img logo-light"
                style="height: 32px; cursor: default;">
            <img src="img/redblack.png" alt="Logo Conecta SENAI" class="logo-img logo-dark"
                style="height: 32px; cursor: default;">

            <button class="btn-text-primary">Salvar</button>
        </div>
    </header>

    <main class="container config-main">

        <section class="config-section">
            <h2 class="section-subtitle">Perfil Público</h2>
            <div class="card list-group">
                <div class="list-item">
                    <div class="item-text">
                        <p class="item-title">Nome de Exibição</p>
                        <p class="item-desc">Como você aparece para os outros.</p>
                    </div>
                    <input type="text" value="João Souza" class="input-clean">
                </div>
                <div class="list-item">
                    <p class="item-title">Biografia</p>
                    <i class="fa-solid fa-chevron-right icon-muted"></i>
                </div>
            </div>
        </section>

        <section class="config-section">
            <h2 class="section-subtitle">Notificações</h2>
            <div class="card list-group">
                <div class="list-item">
                    <div class="item-text">
                        <p class="item-title">Respostas de Feedback</p>
                        <p class="item-desc">Avise-me quando a coordenação responder.</p>
                    </div>
                    <div class="toggle-switch active">
                        <div class="toggle-knob"></div>
                    </div>
                </div>
            </div>
        </section>

        <button class="btn-danger-full">Sair da Conta</button>

    </main>

    <script src="global.js"></script>
    <script src="config.js"></script>
</body>

</html>
